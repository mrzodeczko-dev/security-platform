databaseChangeLog:
  - changeSet:
      id: 001-create-verification-codes-table
      author: rzodeczko
      changes:
        - createTable:
            tableName: verification_codes
            columns:
              - column:
                  name: id
                  type: BINARY(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: code
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: expires_at
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BINARY(16)
                  constraints:
                    nullable: false
                    unique: true
