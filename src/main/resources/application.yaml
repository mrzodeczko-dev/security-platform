server:
  port: 8085
spring:
  application:
    name: api-gateway-service
  threads:
    virtual:
      enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

jwt:
  secret: ${JWT_SECRET}

gateway:
  routes:
    - prefix: /auth
      target: ${AUTH_SERVICE_URL}
    - prefix: /users
      target: ${USER_SERVICE_URL}
  public-paths:
    # Format: "METHOD:path"
    - "POST:/auth/login"
    - "POST:/auth/refresh"
    - "POST:/auth/mfa"
    - "POST:/auth/logout"
    - "POST:/users"
    - "POST:/users/code"
    - "POST:/users/activation"
    - "POST:/users/password/permission"
    - "POST:/users/password/reset"
    - "GET:/"
    - "GET:/actuator/health"
  admin-paths:
    - "PUT:/users/*/role"
  user-paths:
    - "POST:/users/*/mfa"
  cors:
    allowed-origins:
      - "http://localhost:3000"
      - "http://localhost:63342"
  forwarding:
    connect-timeout-ms: 2000
    read-timeout-ms: 10000
  forwarding-max-body-size: ${FORWARDING_MAX_BODY_SIZE:10485760}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    requests-per-second: ${RATE_LIMIT_RPS:20}
    burst-capacity: ${RATE_LIMIT_BURST:40}
    trusted-proxies: ${RATE_LIMIT_TRUSTED_PROXIES:}
