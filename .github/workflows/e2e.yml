name: E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-e2e-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-e2e-
            ${{ runner.os }}-maven-

      - name: Build service Docker images
        run: |
          docker build -t security-platform-user-service -f services/user-service/Dockerfile .
          docker build -t security-platform-auth-service -f services/auth-service/Dockerfile .
          docker build -t security-platform-api-gateway-service -f services/api-gateway-service/Dockerfile .

      - name: Install parent POM
        run: mvn install -N -B --no-transfer-progress

      - name: Run E2E tests
        run: mvn test -pl e2e-tests -Pe2e -B --no-transfer-progress
