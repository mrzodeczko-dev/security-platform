name: E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-e2e-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-e2e-
            ${{ runner.os }}-maven-

      - name: Build service Docker images
        run: docker compose build

      - name: Install parent POM
        run: mvn install -N -B --no-transfer-progress

      - name: Run E2E tests
        run: mvn test -pl e2e-tests -Pe2e -B --no-transfer-progress

      - name: Push Docker images to Docker Hub
        if: success() && github.event_name == 'push'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

          TAG_DATE=$(date -u +%Y-%m-%d)
          TAG="${TAG_DATE}-${{ github.run_number }}"
          NAMESPACE="mrzodeczko"
          SERVICES="security-platform-user-service security-platform-auth-service security-platform-api-gateway-service"

          # fast-fail before any push
          for SERVICE in $SERVICES; do
            docker tag "$SERVICE" "$NAMESPACE/$SERVICE:$TAG"
          done

          # Push versioned tags 
          for SERVICE in $SERVICES; do
            docker push "$NAMESPACE/$SERVICE:$TAG"
          done

          #if all pushed successfully update latest 
          for SERVICE in $SERVICES; do
            docker tag "$SERVICE" "$NAMESPACE/$SERVICE:latest"
            docker push "$NAMESPACE/$SERVICE:latest"
          done
