name: CI - Unit & Integration Tests

on:
  push:
    branches: [ main, develop, 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: "${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: user-service
            module: services/user-service
          - service: auth-service
            module: services/auth-service
          - service: api-gateway-service
            module: services/api-gateway-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ matrix.service }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-${{ matrix.service }}-
            ${{ runner.os }}-maven-

      - name: Install parent POM
        run: mvn install -N -B --no-transfer-progress

      - name: Run tests (${{ matrix.service }})
        run: mvn verify -pl ${{ matrix.module }} -B --no-transfer-progress
