# =============================================================================
# PRODUCTION overrides
# Usage: helm install myrelease ./k8s/security-api-gateway -f k8s/security-api-gateway/values-prod.yaml
# =============================================================================

global:
  namespace: security-gateway-prod

gateway:
  replicas: 3
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUPercent: 70

authService:
  replicas: 2
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi

userService:
  replicas: 2
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi

redis:
  resources:
    requests:
      cpu: 250m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 256Mi

mysql:
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi
  storage:
    size: 20Gi

ingress:
  enabled: true
  className: nginx
  host: api.yourdomain.com
  tls:
    enabled: true
    secretName: gateway-tls

networkPolicy:
  enabled: true
