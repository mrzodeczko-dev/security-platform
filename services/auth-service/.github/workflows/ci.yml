name: ci pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  workflow_call:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: auth-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build (package)
        run: mvn clean package --batch-mode --no-transfer-progress

      - name: Run unit tests
        run: mvn test --batch-mode --no-transfer-progress

      - name: Run integration tests
        run: mvn verify --batch-mode --no-transfer-progress

      - name: Generate JaCoCo report
        run: mvn jacoco:report --batch-mode --no-transfer-progress

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: travel-agency-query-side/target/site/jacoco/
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: travel-agency-query-side/target/site/jacoco/jacoco.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}