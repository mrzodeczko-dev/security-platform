spring:
  application:
    name: user-service-test
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
  mail:
    host: localhost
    port: 3025
    username: test
    password: test
    protocol: smtp
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
    ssl:
      enabled: false

user-activation:
  expiration-ms: 300000
  code-digits: 6

password:
  encoder:
    type: bcrypt

mfa:
  issuer: TestApp

internal:
  secret: test-internal-secret

server:
  port: 0

management:
  health:
    mail:
      enabled: false

springdoc:
  swagger-ui:
    enabled: false
