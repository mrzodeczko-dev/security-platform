services:
  # --------------------------------------------------------------------------------------------------------------------
  # USER MYSQL
  # --------------------------------------------------------------------------------------------------------------------
  user-mysql:
    image: mysql:9.6.0
    restart: unless-stopped
    volumes:
      - user-mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${USER_SERVICE_MYSQL_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${USER_SERVICE_MYSQL_DB_NAME}
      MYSQL_USER: ${USER_SERVICE_MYSQL_DB_USER}
      MYSQL_PASSWORD: ${USER_SERVICE_MYSQL_DB_PASSWORD}
    command: >
      --default-time-zone='+00:00'
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=${USER_SERVICE_MYSQL_INNODB_BUFFER_POOL_SIZE}
      --max-connections=${USER_SERVICE_MYSQL_MAX_CONNECTIONS}
    ports:
      - '${USER_SERVICE_MYSQL_DB_PORT}:3306'
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: [ "CMD-SHELL", "mysql -h localhost -u $$MYSQL_USER -p$$MYSQL_PASSWORD -e \"SELECT 1 FROM information_schema.schemata WHERE schema_name='$$MYSQL_DATABASE'\"" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - mr-network


  # --------------------------------------------------------------------------------------------------------------------
  # USER SERVICE
  # --------------------------------------------------------------------------------------------------------------------
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    restart: on-failure:5
    ports:
      - "${USER_SERVICE_PORT}:8083"
    depends_on:
      user-mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${USER_SERVICE_MYSQL_DB_HOST}:3306/${USER_SERVICE_MYSQL_DB_NAME}?useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${USER_SERVICE_MYSQL_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${USER_SERVICE_MYSQL_DB_PASSWORD}
      MAIL_HOST: ${USER_SERVICE_MAIL_HOST}
      MAIL_USERNAME: ${USER_SERVICE_MAIL_USERNAME}
      MAIL_PASSWORD: ${USER_SERVICE_MAIL_PASSWORD}
      MAIL_PORT: ${USER_SERVICE_MAIL_PORT}
      INTERNAL_SECRET: ${USER_SERVICE_INTERNAL_SECRET}
      MFA_ISSUER: ${USER_SERVICE_MFA_ISSUER}
      SPRINGDOC_API_DOCS_SWAGGER_ENABLED: ${SPRINGDOC_API_DOCS_SWAGGER_ENABLED}
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - mr-network


volumes:
  user-mysql:

networks:
  mr-network: