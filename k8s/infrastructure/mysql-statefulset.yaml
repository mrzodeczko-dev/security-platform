apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: security-platform
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/component: mysql
    app.kubernetes.io/part-of: security-platform
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mysql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mysql
        app.kubernetes.io/component: mysql
        app.kubernetes.io/part-of: security-platform
    spec:
      containers:
        - name: mysql
          image: mysql:9.6.0
          args:
            - "--default-time-zone=+00:00"
            - "--character-set-server=utf8mb4"
            - "--collation-server=utf8mb4_unicode_ci"
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          envFrom:
            - configMapRef:
                name: mysql-config
            - secretRef:
                name: security-platform-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          startupProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["bash", "-c", "mysql -h localhost -u$MYSQL_USER -p$MYSQL_PASSWORD -e 'SELECT 1'"]
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
