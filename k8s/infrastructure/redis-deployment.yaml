apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: security-platform
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: redis
    app.kubernetes.io/part-of: security-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/component: redis
        app.kubernetes.io/part-of: security-platform
    spec:
      containers:
        - name: redis
          image: redis:8.2-alpine
          command: ["sh", "-c"]
          args:
            - >-
              redis-server
              --bind 0.0.0.0
              --protected-mode yes
              --requirepass "$REDIS_PASSWORD"
              --appendonly yes
              --maxmemory 128mb
              --maxmemory-policy allkeys-lru
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          envFrom:
            - secretRef:
                name: security-platform-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          startupProbe:
            exec:
              command: ["sh", "-c", "redis-cli --no-auth-warning -a \"$REDIS_PASSWORD\" ping"]
            failureThreshold: 10
            periodSeconds: 3
          livenessProbe:
            exec:
              command: ["sh", "-c", "redis-cli --no-auth-warning -a \"$REDIS_PASSWORD\" ping"]
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["sh", "-c", "redis-cli --no-auth-warning -a \"$REDIS_PASSWORD\" ping"]
            periodSeconds: 5
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          emptyDir: {}
