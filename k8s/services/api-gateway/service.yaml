apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: security-platform
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: security-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api-gateway
  ports:
    - name: http
      port: 8085
      targetPort: http
      protocol: TCP
