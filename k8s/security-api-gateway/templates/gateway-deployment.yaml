apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-gateway
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: gateway
    {{- include "app.labels" . | nindent 4 }}
spec:
  {{- if not .Values.gateway.hpa.enabled }}
  replicas: {{ .Values.gateway.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
      {{- include "app.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/component: gateway
        {{- include "app.selectorLabels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api-gateway
          image: {{ .Values.gateway.image }}
          ports:
            - containerPort: {{ .Values.gateway.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-gateway-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: jwt-secret
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: redis-password
          resources:
            requests:
              cpu: {{ .Values.gateway.resources.requests.cpu }}
              memory: {{ .Values.gateway.resources.requests.memory }}
            limits:
              cpu: {{ .Values.gateway.resources.limits.cpu }}
              memory: {{ .Values.gateway.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.gateway.port }}
            initialDelaySeconds: {{ .Values.gateway.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.gateway.probes.liveness.periodSeconds }}
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.gateway.port }}
            initialDelaySeconds: {{ .Values.gateway.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.gateway.probes.readiness.periodSeconds }}
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
