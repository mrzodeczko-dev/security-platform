apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-auth-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/component: auth
    {{- include "app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.authService.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-service
      {{- include "app.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-service
        app.kubernetes.io/component: auth
        {{ include "app.selectorLabels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: auth-service
          image: {{ .Values.authService.image }}
          ports:
            - containerPort: {{ .Values.authService.port }}
              protocol: TCP
          env:
            - name: SPRING_APPLICATION_NAME
              value: auth-service
            - name: SERVER_PORT
              value: {{ .Values.authService.port | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: jwt-secret
            - name: JWT_ACCESS_TOKEN_EXPIRATION_MS
              value: {{ .Values.authService.env.accessTokenExpirationMs | quote }}
            - name: JWT_REFRESH_TOKEN_EXPIRATION_MS
              value: {{ .Values.authService.env.refreshTokenExpirationMs | quote }}
            - name: USER_SERVICE_URL
              value: "http://{{ .Release.Name }}-user-service:{{ .Values.userService.port }}"
            - name: INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: internal-secret
            - name: REDIS_HOST
              value: "{{ .Release.Name }}-redis"
            - name: REDIS_PORT
              value: {{ .Values.redis.port | quote }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: redis-password
          resources:
            requests:
              cpu: {{ .Values.authService.resources.requests.cpu }}
              memory: {{ .Values.authService.resources.requests.memory }}
            limits:
              cpu: {{ .Values.authService.resources.limits.cpu }}
              memory: {{ .Values.authService.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.authService.port }}
            initialDelaySeconds: {{ .Values.authService.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.authService.probes.liveness.periodSeconds }}
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.authService.port }}
            initialDelaySeconds: {{ .Values.authService.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.authService.probes.readiness.periodSeconds }}
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
