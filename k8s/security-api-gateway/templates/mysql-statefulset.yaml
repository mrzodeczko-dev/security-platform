apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-mysql
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/component: database
    {{- include "app.labels" . | nindent 4 }}
spec:
  serviceName: {{ .Release.Name }}-mysql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mysql
      {{- include "app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mysql
        app.kubernetes.io/component: database
        {{- include "app.selectorLabels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: mysql
          image: {{ .Values.mysql.image }}
          ports:
            - containerPort: {{ .Values.mysql.port }}
              protocol: TCP
          args:
            - --default-time-zone=+00:00
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
            - --innodb-buffer-pool-size={{ .Values.mysql.config.innodbBufferPoolSize }}
            - --max-connections={{ .Values.mysql.config.maxConnections }}
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              value: {{ .Values.secrets.mysqlDatabase | quote }}
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: mysql-user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: mysql-password
          resources:
            requests:
              cpu: {{ .Values.mysql.resources.requests.cpu }}
              memory: {{ .Values.mysql.resources.requests.memory }}
            limits:
              cpu: {{ .Values.mysql.resources.limits.cpu }}
              memory: {{ .Values.mysql.resources.limits.memory }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "mysql -h localhost -u $MYSQL_USER -p$MYSQL_PASSWORD -e 'SELECT 1'"
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "mysql -h localhost -u $MYSQL_USER -p$MYSQL_PASSWORD -e 'SELECT 1'"
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.mysql.storage.storageClass }}
        storageClassName: {{ .Values.mysql.storage.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.mysql.storage.size }}
