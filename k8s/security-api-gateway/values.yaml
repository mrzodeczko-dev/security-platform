# =============================================================================
# DEV / default values
# Override with values-prod.yaml for production:
#   helm install myrelease ./k8s/security-api-gateway -f k8s/security-api-gateway/values-prod.yaml
# =============================================================================

global:
  namespace: security-gateway-dev

# ---------------------------------------------------------------------------
# API Gateway
# ---------------------------------------------------------------------------
gateway:
  image: mrzodeczko/api-gateway-service:1.0.0
  replicas: 1
  port: 8085

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

  env:
    rateLimitEnabled: "true"
    rateLimitRps: "20"
    rateLimitBurst: "40"

  hpa:
    enabled: false

  probes:
    liveness:
      initialDelaySeconds: 60
      periodSeconds: 15
    readiness:
      initialDelaySeconds: 30
      periodSeconds: 10

# ---------------------------------------------------------------------------
# Auth Service
# ---------------------------------------------------------------------------
authService:
  image: mrzodeczko/auth-service-security:1.0.0
  replicas: 1
  port: 8084

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

  env:
    accessTokenExpirationMs: "900000"
    refreshTokenExpirationMs: "604800000"

  probes:
    liveness:
      initialDelaySeconds: 60
      periodSeconds: 15
    readiness:
      initialDelaySeconds: 30
      periodSeconds: 10

# ---------------------------------------------------------------------------
# User Service
# ---------------------------------------------------------------------------
userService:
  image: mrzodeczko/users-service-security:1.0.0
  replicas: 1
  port: 8083

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 768Mi

  env:
    mailHost: ""
    mailPort: "587"
    mfaIssuer: "SecurityApp"

  probes:
    liveness:
      initialDelaySeconds: 60
      periodSeconds: 15
    readiness:
      initialDelaySeconds: 30
      periodSeconds: 10

# ---------------------------------------------------------------------------
# Redis
# ---------------------------------------------------------------------------
redis:
  image: redis:8.2-alpine
  port: 6379

  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 192Mi

  config:
    maxmemory: 128mb
    maxmemoryPolicy: allkeys-lru

# ---------------------------------------------------------------------------
# MySQL
# ---------------------------------------------------------------------------
mysql:
  image: mysql:9.6.0
  port: 3306

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

  storage:
    size: 5Gi
    storageClass: ""

  config:
    innodbBufferPoolSize: 128M
    maxConnections: "50"

# ---------------------------------------------------------------------------
# Secrets — override these via --set or external secret manager
# ---------------------------------------------------------------------------
secrets:
  jwtSecret: ""
  redisPassword: ""
  mysqlRootPassword: ""
  mysqlDatabase: "user_service_db"
  mysqlUser: ""
  mysqlPassword: ""
  internalSecret: ""
  mailUsername: ""
  mailPassword: ""

# ---------------------------------------------------------------------------
# Ingress (optional)
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: nginx
  host: gateway.local
  tls:
    enabled: false
    secretName: gateway-tls

# ---------------------------------------------------------------------------
# Network Policy
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: true
