apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-auth-service
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: auth-service
    app.kubernetes.io/part-of: security-platform
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" }}
spec:
  {{- if not .Values.authService.autoscaling.enabled }}
  replicas: {{ .Values.authService.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-service
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-service
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: auth-service
        app.kubernetes.io/part-of: security-platform
      {{- if .Values.monitoring.enabled }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: {{ .Values.monitoring.path | quote }}
        prometheus.io/port: {{ .Values.authService.port | quote }}
      {{- end }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: auth-service
                    app.kubernetes.io/instance: {{ .Release.Name }}
                topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 30
      containers:
        - name: auth-service
          image: "{{ .Values.global.image.registry }}/{{ .Values.global.image.namespace }}/{{ .Values.authService.image.repository }}:{{ .Values.authService.image.tag | default .Values.global.image.tag }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.authService.port }}
              protocol: TCP
          env:
            - name: REDIS_HOST
              value: {{ if .Values.redis.enabled }}{{ .Release.Name }}-redis{{ else }}{{ .Values.redis.external.host }}{{ end }}
            - name: REDIS_PORT
              value: {{ .Values.redis.port | quote }}
            - name: USER_SERVICE_URL
              value: "http://{{ .Release.Name }}-user-service:{{ .Values.userService.port }}"
            {{- range $key, $value := .Values.authService.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-secrets
          resources:
            {{- toYaml .Values.authService.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ ALL ]
          startupProbe:
            httpGet:
              path: {{ .Values.authService.probes.startup.path }}
              port: http
            failureThreshold: {{ .Values.authService.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.authService.probes.startup.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.authService.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.authService.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.authService.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.authService.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.authService.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.authService.probes.readiness.periodSeconds }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: { }
