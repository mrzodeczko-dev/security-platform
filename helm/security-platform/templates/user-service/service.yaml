apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-user-service
  labels:
    app.kubernetes.io/name: user-service
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: user-service
    app.kubernetes.io/part-of: security-platform
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.userService.port }}
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: user-service
    app.kubernetes.io/instance: {{ .Release.Name }}
