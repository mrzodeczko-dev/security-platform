{{- if .Values.userService.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-user-service
  labels:
    app.kubernetes.io/name: user-service
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: user-service
    app.kubernetes.io/part-of: security-platform
spec:
  minAvailable: {{ .Values.userService.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: user-service
      app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
