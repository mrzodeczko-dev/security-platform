apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api-gateway
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api-gateway
    app.kubernetes.io/part-of: security-platform
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" }}
spec:
  {{- if not .Values.apiGateway.autoscaling.enabled }}
  replicas: {{ .Values.apiGateway.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: api-gateway
        app.kubernetes.io/part-of: security-platform
      {{- if .Values.monitoring.enabled }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: {{ .Values.monitoring.path | quote }}
        prometheus.io/port: {{ .Values.apiGateway.port | quote }}
      {{- end }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: api-gateway
                    app.kubernetes.io/instance: {{ .Release.Name }}
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
              app.kubernetes.io/instance: {{ .Release.Name }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: api-gateway
          image: "{{ .Values.global.image.registry }}/{{ .Values.global.image.namespace }}/{{ .Values.apiGateway.image.repository }}:{{ .Values.apiGateway.image.tag | default .Values.global.image.tag }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.apiGateway.port }}
              protocol: TCP
          env:
            - name: REDIS_HOST
              value: {{ if .Values.redis.enabled }}{{ .Release.Name }}-redis{{ else }}{{ .Values.redis.external.host }}{{ end }}
            - name: REDIS_PORT
              value: {{ .Values.redis.port | quote }}
            - name: AUTH_SERVICE_URL
              value: "http://{{ .Release.Name }}-auth-service:{{ .Values.authService.port }}"
            - name: USER_SERVICE_URL
              value: "http://{{ .Release.Name }}-user-service:{{ .Values.userService.port }}"
            {{- range $key, $value := .Values.apiGateway.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-secrets
          resources:
            {{- toYaml .Values.apiGateway.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          startupProbe:
            httpGet:
              path: {{ .Values.apiGateway.probes.startup.path }}
              port: http
            failureThreshold: {{ .Values.apiGateway.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.apiGateway.probes.startup.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.apiGateway.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.apiGateway.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.apiGateway.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.apiGateway.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.apiGateway.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.apiGateway.probes.readiness.periodSeconds }}
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
